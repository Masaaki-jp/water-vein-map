<!DOCTYPE html>
<html>
  <head>
    <title>自然保護・水脈マップ</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #212121;
      }
      #map {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <script>
      function initMap() {
        // レガシー形式に変換したダーク＆水脈強調スタイル
        const darkWaterStyle = [
          // 全体の背景をダークグレーに
          { "elementType": "geometry", "stylers": [{ "color": "#212121" }] },
          // アイコンを非表示
          { "elementType": "labels.icon", "stylers": [{ "visibility": "off" }] },
          // 地名を白く光らせて読みやすく
          { "elementType": "labels.text.fill", "stylers": [{ "color": "#ffffff" }] },
          { "elementType": "labels.text.stroke", "stylers": [{ "color": "#000000" }] },
          // 道路、建物、商業施設（POI）、路線をすべて非表示
          { "featureType": "poi", "stylers": [{ "visibility": "off" }] },
          { "featureType": "road", "stylers": [{ "visibility": "off" }] },
          { "featureType": "transit", "stylers": [{ "visibility": "off" }] },
          { "featureType": "administrative", "elementType": "geometry", "stylers": [{ "visibility": "off" }] },
          // 水域（川・湖・海）を鮮やかなシアンブルーに
          { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#00aaff" }] },
          { "featureType": "water", "elementType": "labels.text.fill", "stylers": [{ "color": "#ffffff" }] }
        ];

        const mapOptions = {
          center: { lat: 35.5824, lng: 139.6226 }, // 初期位置：川崎市中原区周辺
          zoom: 12,
          styles: darkWaterStyle,
          disableDefaultUI: true // 余計なUIを消してスッキリさせる
        };

        const map = new google.maps.Map(document.getElementById("map"), mapOptions);
      }
    </script>

    <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAObU0OTcRWyC3DJTEGjLMsrNkbbtzXIT8&callback=initMap">
    </script>
  </body>
</html>
